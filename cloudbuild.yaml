steps:
  # 2. Build the container
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA"
      - "."
    # If your Dockerfile needs the SSH key to pull private repos, you might pass it as a build arg or volume here

    # 3. Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: [ "push", "gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA" ]

  # 4. Deploy the image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "backend-service"
      - "--image"
      - "gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA"
      - "--region"
      - "us-central1"
      # Re-use the existing service account configured in Terraform
      - "--service-account"
      - "backend-sa@$PROJECT_ID.iam.gserviceaccount.com"

images:
  - "gcr.io/$PROJECT_ID/backend-service:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
